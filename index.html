<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; font-src 'self' https://fonts.gstatic.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; script-src 'self';">
    <title>WE10 Memory Research System V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="we10-header">
        <h1>WE10 MEMORY SYSTEM V2</h1>
        <div class="system-sub">RESEARCH & DATASET ENGINE</div>
      </header>

      <section class="control-panel">
        <button class="btn" id="btnHomeView">MATCHING CENTER</button>
        <button class="btn" id="btnOpenDatabase">MEMORY DATABASE</button>
        <div id="activeViewIndicator" class="view-indicator">MODE: MATCHING CENTER</div>
      </section>

      <div class="game-screen">
        <div class="schedule-tab" id="panelTitle">MATCHING INTERFACE</div>
        
        <div class="main-board">
          <div class="editor-nav-bar hidden" id="editorNav">
            <button class="btn btn-nav" id="btnPrevGame">◀ PREV GAME</button>
            <div class="game-badge" id="currentGameLabel">GAME 1</div>
            <button class="btn btn-nav" id="btnNextGame">NEXT GAME ▶</button>
            <button class="btn" id="btnAddGame">+ ADD GAME</button>
          </div>

          <div class="dataset-container">
            <div class="p1-row">
              <label for="p1Input">P1 METADATA (OPTIONAL):</label>
              <div class="team-input-wrap" style="flex-grow: 1;">
                <input type="text" id="p1Input" placeholder="Masukkan Negara P1 (e.g. Spain)" autocomplete="off" />
                <div class="suggestions-box hidden"></div>
              </div>
            </div>
            
            <div class="match-grid" id="matchGridForm">
              </div>
            <div class="section-title">TOP GOALS</div>
            <div class="top-goals-grid" id="topGoalsForm">
              </div>
          </div>

          <div class="action-footer" id="homeActions">
            <div class="filter-wrap" style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
              <label for="minSimilarity" style="font-size: 0.8rem;">Min Similarity (%):</label>
              <select id="minSimilarity" style="width: 70px; padding: 5px; font-family: 'Press Start 2P', monospace; font-size: 0.8rem; background: #000; color: #0f0; border: 1px solid #0f0;">
                <option value="0">0</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="75">75</option>
                <option value="90">90</option>
                <option value="95">95</option>
                <option value="100">100</option>
              </select>
            </div>
            <button class="btn btn-primary btn-large" id="btnRunMatch">CARI KECOCOKAN</button>
            <button class="btn" id="btnClearForm">RESET FORM</button>
          </div>
        </div>
      </div>

      <section class="results-panel hidden" id="resultsPanel">
        <div class="results-header">RESULT OUTPUT</div>
        <div class="results-body" id="resultsOutput"></div>
      </section>
    </main>

    <div class="modal-overlay hidden" id="databaseModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>MEMORY DATABASE</h2>
          <button class="close-modal" id="btnCloseModal">X</button>
        </div>
        <div class="modal-body" id="databaseModalList">
          </div>
      </div>
    </div>

    <input type="file" id="jsonImportField" class="hidden" accept=".json" />

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
