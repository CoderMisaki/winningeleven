<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <title>Retro Soccer Memory Backtest</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>
  <body>
    <main class="page-shell" aria-label="Retro Soccer Simulator">

      <!-- Top Actions -->
      <section class="top-actions">
        <button class="btn btn-import" id="openMemoryModalBtn">Memory Database</button>
        <button class="btn btn-predict" id="openSearchModalBtn">🔍 Cari Kecocokan</button>
      </section>

      <div class="game-screen">
        <div class="schedule-tab" id="memoryTitleTab">MEMORY 1</div>
        <div class="main-board">

          <!-- Single Game Editor replacing old match-editor & cup-header -->
          <div class="single-game-editor" id="singleGameEditor">
            <div class="sge-header">
               <span class="arrow" id="prevGameBtn">&#9664; Previous</span>
               <div class="sge-title">
                  <h2 id="gameNumberDisplay">Game 1</h2>
                  <div class="p1-input-wrap">
                      <label for="p1Input">P1</label>
                      <input type="text" id="p1Input" placeholder="Spain" autocomplete="off" />
                  </div>
               </div>
               <span class="arrow" id="nextGameBtn">Next &#9654;</span>
            </div>

            <div class="sge-body">
               <div class="smart-input-wrap">
                  <input id="homeInput" placeholder="Negara Kiri" autocomplete="off">
               </div>
               <input class="score-input" id="scoreInput" placeholder="0-0">
               <div class="smart-input-wrap">
                  <input id="awayInput" placeholder="Negara Kanan" autocomplete="off">
               </div>
            </div>

            <div class="sge-footer">
               <button class="btn btn-clear" id="deleteGameBtn">Delete Game</button>
               <button class="btn btn-import" id="addGameBtn">+ Add Game</button>
            </div>
          </div>

          <div class="schedule-list" id="scheduleList" aria-live="polite"></div>
        </div>

        <section class="top-goals-panel" aria-labelledby="topGoalsTitle">
          <div class="top-goals-header">
             <h2 id="topGoalsTitle">TOP GOALS</h2>
             <span class="manual-badge">BENDERA • PEMAIN • GOAL</span>
          </div>
          <div class="top-goals-list" id="topGoalsList"></div>
        </section>
      </div>
    </main>

    <!-- Modal Dialogs -->
    <dialog id="memoryModal" class="modal-dialog">
      <div class="modal-content">
         <div class="modal-header">
            <h2>Memory Database</h2>
            <button class="btn-close" id="closeMemoryModalBtn">&times;</button>
         </div>
         <div class="modal-body" id="memoryListContainer">
            <!-- Rendered via JS -->
         </div>
      </div>
    </dialog>

    <dialog id="searchModal" class="modal-dialog">
      <div class="modal-content">
         <div class="modal-header">
            <h2>Cari Kecocokan</h2>
            <button class="btn-close" id="closeSearchModalBtn">&times;</button>
         </div>
         <div class="modal-body">
            <div class="search-input-section">
               <div class="search-p1-wrap">
                  <label>P1 (Opsional)</label>
                  <input type="text" id="searchP1" placeholder="Spain">
               </div>
               <div id="searchGamesContainer">
                  <!-- 7 input rows rendered via JS -->
               </div>
               <button class="btn btn-predict" id="executeSearchBtn" style="width: 100%; margin-top: 1rem;">Cari Kecocokan</button>
            </div>
            <div class="search-results-section" id="searchResultsContainer">
               <!-- Results here -->
            </div>
         </div>
      </div>
    </dialog>

    <!-- Hidden File Input for Import -->
    <input type="file" id="importFileInput" accept=".json" style="display: none;" />

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
