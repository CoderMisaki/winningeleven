<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Soccer Simulator - Power Based Logic</title>
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --board-bg: #e3e3e3;
            --row-light: #dcdcdc;
            --row-dark: #cdcdcd;
            --accent: #212936;
            --orange: #d18d3f;
            --red: #d32f2f;
        }

        body {
            margin: 0; padding: 20px;
            background-color: var(--bg-dark);
            font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
            color: #333;
        }

        .controls-wrapper {
            width: 100%; max-width: 900px;
            background: #2b2b2b; border: 3px solid #555;
            border-radius: 8px; padding: 15px; margin-bottom: 20px;
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            box-sizing: border-box; color: white;
        }

        .controls-wrapper label { font-weight: bold; font-size: 14px; margin-right: 5px; }

        .controls-wrapper input[type="number"] {
            width: 50px; padding: 8px; font-size: 16px;
            border: 2px inset #888; background: #ddd;
            border-radius: 4px; text-align: center;
        }

        .controls-wrapper input[type="text"] {
            flex: 1; min-width: 300px;
            padding: 10px; font-size: 14px;
            border: 2px inset #888; background: #ddd;
            text-transform: lowercase; outline: none;
            border-radius: 4px; font-family: monospace;
        }

        .controls-wrapper input:focus { background: #fff; }

        .btn {
            padding: 10px 15px; font-size: 14px; font-weight: bold;
            border: 2px solid #000; cursor: pointer;
            border-radius: 4px; transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn-import { background: #4caf50; color: white; border-color: #1b5e20; }
        .btn-predict { background: var(--orange); color: white; border-color: #8c571c; }
        .btn-clear { background: var(--red); color: white; border-color: #881b1b; }
        
        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }
        .btn:active { transform: translateY(1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .game-screen {
            width: 100%; max-width: 900px;
            background-color: #d6bc96;
            background-image: 
                linear-gradient(rgba(255,255,255,0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.4) 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 20px; box-sizing: border-box;
            border: 4px solid #000; border-radius: 8px;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.6);
        }

        .schedule-tab {
            background-color: #2b2b2b; color: #fff;
            display: inline-block; padding: 6px 20px;
            font-size: 18px; font-weight: bold;
            border: 2px solid #555; border-bottom: none;
            border-radius: 8px 8px 0 0; margin-left: 10px;
            margin-bottom: -3px; position: relative; z-index: 2;
        }

        .main-board {
            background-color: var(--board-bg);
            border: 3px solid #333; position: relative; z-index: 1;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .cup-header {
            background-color: #2d2d2d; color: #ffffff;
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; border-bottom: 2px solid #111;
        }

        .arrow { color: var(--orange); font-size: 20px; cursor: pointer; transition: transform 0.2s; }
        .arrow:hover { transform: scale(1.3); }
        .cup-title { text-align: center; }
        .cup-title h2 { margin: 0; font-size: 20px; letter-spacing: 2px; text-shadow: 2px 2px 0px #000; }
        .cup-title h3 { margin: 2px 0 0 0; font-size: 14px; color: #aaa; }

        .schedule-list { display: flex; flex-direction: column; }
        
        .match-row {
            display: flex; align-items: center; padding: 8px 10px;
            border-bottom: 1px solid #999;
            transition: background 0.3s ease, opacity 0.3s ease;
            height: 38px;
        }

        .match-row:nth-child(even) { background-color: var(--row-light); }
        .match-row:nth-child(odd) { background-color: var(--row-dark); }
        .match-row:hover { background-color: #c0c0c0; }

        .team-container { flex: 1; display: flex; align-items: center; gap: 10px; }
        .left-team { justify-content: flex-end; text-align: right; }
        .right-team { justify-content: flex-start; flex-direction: row-reverse; text-align: left; }
        .team-name { font-size: 15px; font-weight: bold; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        .empty-name { color: #888; font-weight: normal; font-style: italic; }

        .flag-box {
            width: 32px; height: 22px; border: 1px solid #555;
            display: flex; justify-content: center; align-items: center;
            background: #fff; font-size: 20px; overflow: hidden;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }
        .empty-flag { background: #bbb; border: 1px solid #888; box-shadow: none; }

        .score-box {
            width: 120px; height: 30px; background-color: var(--accent);
            color: #fff; display: flex; justify-content: center; align-items: center;
            font-size: 18px; font-weight: bold; border: 1px solid #111;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8);
            margin: 0 15px; flex-shrink: 0;
        }

        .result-side {
            flex-direction: row !important;
            justify-content: flex-start !important;
        }
        .result-name-left { text-align: left; margin-left: 10px; flex: 1; }
        .result-name-right { text-align: right; margin-right: 10px; flex: 1; }
        .ht-scores-left { margin-left: 5px; }
        .ht-scores-right { margin-right: 5px; }

        .total-score {
            font-size: 24px; font-weight: bold;
            width: 30px; text-align: center; color: #222;
        }

        .ht-scores {
            display: flex; flex-direction: column;
            font-size: 13px; line-height: 1.1; font-weight: bold;
            color: #555; width: 20px; text-align: center;
        }

        .dash {
            font-size: 20px; font-weight: bold; color: #444;
            width: 30px; text-align: center; flex-shrink: 0;
        }

        .ext-pk-box {
            font-size: 11px; width: 55px; 
            display: flex; flex-direction: column; 
            justify-content: center; gap: 2px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .game-screen { padding: 10px; }
            .score-box { width: 80px; font-size: 16px; margin: 0 5px; }
            .team-name { font-size: 13px; max-width: 80px; }
            .flag-box { width: 28px; height: 18px; font-size: 16px; }
            .controls-wrapper input[type="text"] { width: 100%; min-width: unset; }
            .total-score { font-size: 18px; width: 20px; }
            .ht-scores { font-size: 11px; width: 15px; }
            .dash { width: 15px; font-size: 18px; margin: 0 5px; }
            .ext-pk-box { width: 40px; font-size: 9px; }
        }
    </style>
</head>
<body>

    <div class="controls-wrapper">
        <label>Baris:</label>
        <input type="number" id="rowCount" value="7" min="1" max="16">
        <input type="text" id="importInput" placeholder="Contoh: polvsned, irlvsaut, denvsswe" autocomplete="off">
        <button class="btn btn-import" onclick="importTeams()">Import</button>
        <button class="btn btn-predict" id="predictBtn" onclick="predictAll()">Prediksi</button>
        <button class="btn btn-clear" onclick="clearAll()">Clear</button>
    </div>

    <div class="game-screen">
        <div class="schedule-tab">Schedule table</div>
        <div class="main-board">
            <div class="cup-header">
                <span class="arrow">&#9664;</span>
                <div class="cup-title">
                    <h2 id="cupName">Konami Cup</h2>

                </div>
                <span class="arrow">&#9654;</span>

            <div class="schedule-list" id="scheduleList">

    </div>

        // Menghitung Base Power sesuai data atribut
        for (let key in teamsDB) {
            let t = teamsDB[key];
            t.power = Math.round(t.offense * 0.22 + t.defense * 0.22 + t.speed * 0.18 + t.technique * 0.18 + t.teamwork * 0.20);
        }

        let currentMatches = [];
        let activeTimeouts = []; 

        document.addEventListener('DOMContentLoaded', () => { clearAll(); });

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        function clearAll() {
            activeTimeouts.forEach(clearTimeout);
            activeTimeouts = [];
            document.getElementById('predictBtn').disabled = false;

            document.getElementById('importInput').value = ""; 
            let rowCount = parseInt(document.getElementById('rowCount').value);
            if(isNaN(rowCount)) rowCount = 7;
            rowCount = Math.min(16, Math.max(1, rowCount));
            document.getElementById('rowCount').value = rowCount;

            currentMatches = Array(rowCount).fill().map(() => ({ home: null, away: null, played: false }));
            renderSchedule();
        }

        function importTeams() {
            activeTimeouts.forEach(clearTimeout);
            activeTimeouts = [];
            document.getElementById('predictBtn').disabled = false;

            const inputVal = document.getElementById('importInput').value.toLowerCase();
            let rowCount = parseInt(document.getElementById('rowCount').value);
            
            if(isNaN(rowCount)) rowCount = 7;
            rowCount = Math.min(16, Math.max(1, rowCount));
            document.getElementById('rowCount').value = rowCount;

            if(inputVal.trim() === "") return alert("Format kode kosong!");

            let rawMatchups = inputVal.split(',').map(m => m.trim()).filter(m => m !== '');
            let parsedMatches = [];
            let invalidInputs = [];

            rawMatchups.forEach(matchup => {
                let parts = matchup.split('vs');
                if(parts.length === 2) {
                    let homeCode = parts[0].trim().toUpperCase();
                    let awayCode = parts[1].trim().toUpperCase();
                    if(teamsDB[homeCode] && teamsDB[awayCode]) {
                        parsedMatches.push({ home: homeCode, away: awayCode, played: false });
                    } else {
                        invalidInputs.push(matchup);
                    }
                } else {
                    invalidInputs.push(matchup);
                }
            });

            if (invalidInputs.length > 0) {
                alert("Format atau kode negara tidak valid (diabaikan):\n\n" + invalidInputs.join("\n"));
            }

            currentMatches = [];
            for(let i = 0; i < rowCount; i++) {
                if(parsedMatches[i]) currentMatches.push(parsedMatches[i]);
                else currentMatches.push({ home: null, away: null, played: false });
            }
            renderSchedule();
        }

        function renderSchedule() {
            const listEl = document.getElementById('scheduleList');
            listEl.innerHTML = ''; 

            currentMatches.forEach((match, index) => {
                const row = document.createElement('div');
                row.className = 'match-row';
                row.id = `row-${index}`; 
                
                if(match.home && match.away) {
                    const homeData = teamsDB[match.home];
                    const awayData = teamsDB[match.away];
                    row.innerHTML = `
                        <div class="team-container left-team">
                            <span class="team-name">${escapeHTML(homeData.name)}</span>
                            <div class="flag-box">${homeData.flag}</div>
                        </div>
                        <div class="score-box"><span class="score-text">-</span></div>
                        <div class="team-container right-team">
                            <span class="team-name">${escapeHTML(awayData.name)}</span>
                            <div class="flag-box">${awayData.flag}</div>
                        </div>
                    `;
                } else {
                    row.innerHTML = `
                        <div class="team-container left-team">
                            <span class="team-name empty-name">---</span>
                            <div class="flag-box empty-flag"></div>
                        </div>
                        <div class="score-box"><span class="score-text">-</span></div>
                        <div class="team-container right-team">
                            <span class="team-name empty-name">---</span>
                            <div class="flag-box empty-flag"></div>
                        </div>
                    `;
                }
                listEl.appendChild(row);
            });
        }

        function calculateScore(home, away) {
            let powerDiff = home.power - away.power;
            let absDiff = Math.abs(powerDiff);

            let hGoals = 0;
            let aGoals = 0;

            // KONSEP DETERMINISTIK MUTLAK
            if (absDiff === 0) {
                // ATURAN 1: POWER SAMA = WAJIB DRAW (Skor random 0-0 sampai 2-2)
                let drawGoals = Math.floor(Math.random() * 3);
                hGoals = drawGoals;
                aGoals = drawGoals;
            } else {
                // ATURAN 2: POWER LEBIH BESAR WAJIB MENANG & SELISIH POWER = SELISIH GOL
                let goalMargin = 1;

                if (absDiff === 1) {
                    goalMargin = 1; // 1-0, 2-1
                } else if (absDiff === 2) {
                    goalMargin = Math.random() < 0.5 ? 1 : 2; // 2-0, 2-1
                } else if (absDiff === 3) {
                    goalMargin = 2; // 2-0, 3-1
                } else if (absDiff === 4) {
                    goalMargin = Math.random() < 0.5 ? 2 : 3; // 3-1, 3-0
                } else if (absDiff === 5) {
                    goalMargin = 3; // 3-0, 4-1
                } else if (absDiff >= 6) {
                    // Skor bantai mirroring selisih power (misal beda 8 power -> beda 4/5 gol)
                    goalMargin = Math.floor(absDiff / 1.6) + (Math.random() > 0.5 ? 1 : 0);
                }

                // Capping margin agar skor maksimal tidak tembus belasan
                if (goalMargin > 8) goalMargin = 8;
                if (goalMargin < 1) goalMargin = 1;

                // Menentukan gol hiburan untuk tim yang kalah
                let losingGoals = 0;
                let r = Math.random();
                if (absDiff < 4) {
                    // Match ketat, tim kalah masih mungkin cetak gol
                    losingGoals = r < 0.5 ? 0 : (r < 0.85 ? 1 : 2);
                } else {
                    // Match bantai, tim kalah sangat jarang cetak gol
                    losingGoals = r < 0.75 ? 0 : 1;
                }

                if (powerDiff > 0) {
                    // Tim Home Menang
                    aGoals = losingGoals;
                    hGoals = aGoals + goalMargin;
                } else {
                    // Tim Away Menang
                    hGoals = losingGoals;
                    aGoals = hGoals + goalMargin;
                }
            }

            let wentToExtraTime = false;
            let wentToPenalties = false;
            let exH = 0, exA = 0;
            let pkH = 0, pkA = 0;

            // Logika Turnamen Gugur Konami Cup (Khusus jika skor waktu normal Draw)
            if (hGoals === aGoals) {
                wentToExtraTime = true;
                let exChance = Math.random();
                if (exChance < 0.5) { 
                    if (Math.random() < 0.5) exH = 1; else exA = 1;
                } else {
                    if (Math.random() < 0.4) { exH = 1; exA = 1; }
                }

                if ((hGoals + exH) === (aGoals + exA)) {
                    wentToPenalties = true;
                    pkH = Math.floor(Math.random() * 3) + 3; 
                    pkA = Math.floor(Math.random() * 3) + 3; 
                    if (pkH === pkA) {
                        if (Math.random() < 0.5) pkH++; else pkA++;
                    }
                }
            }
            
            return { 
                h: hGoals, a: aGoals,
                wentToExtraTime, wentToPenalties,
                exH, exA, pkH, pkA
            };
        }

        function predictAll() {
            let hasValidMatch = currentMatches.some(m => m.home && m.away && !m.played);
            if(!hasValidMatch) return alert("Tidak ada pertandingan baru yang bisa diprediksi!");

            document.getElementById('predictBtn').disabled = true;

            let lastPlayableIndex = -1;
            for (let i = currentMatches.length - 1; i >= 0; i--) {
                if (currentMatches[i].home && !currentMatches[i].played) {
                    lastPlayableIndex = i;
                    break;
                }
            }

            currentMatches.forEach((match, index) => {
                if(!match.home || !match.away || match.played) return; 

                const rowEl = document.getElementById(`row-${index}`);
                const homeData = teamsDB[match.home];
                const awayData = teamsDB[match.away];

                match.played = true; 
                rowEl.style.opacity = '0';
                
                let tId = setTimeout(() => {
                    const result = calculateScore(homeData, awayData);
                    
                    const homeH1 = result.h === 0 ? 0 : Math.floor(Math.random() * (result.h + 1));
                    const homeH2 = result.h - homeH1;
                    const awayH1 = result.a === 0 ? 0 : Math.floor(Math.random() * (result.a + 1));
                    const awayH2 = result.a - awayH1;

                    let totalH = result.h + result.exH;
                    let totalA = result.a + result.exA;

                    let middleHTML = `<div class="dash">-</div>`;
                    if (result.wentToPenalties) {
                        middleHTML = `
                            <div class="dash ext-pk-box">
                                <span>${result.exA} EX. ${result.exH}</span>
                                <span>${result.pkA} P.K. ${result.pkH}</span>
                            </div>
                        `;
                    } else if (result.wentToExtraTime) {
                        middleHTML = `
                            <div class="dash ext-pk-box">
                                <span>${result.exA} EX. ${result.exH}</span>
                            </div>
                        `;
                    }

                    rowEl.innerHTML = `
                        <div class="team-container result-side">
                            <div class="flag-box">${awayData.flag}</div>
                            <span class="team-name result-name-left">${escapeHTML(awayData.name)}</span>
                            <span class="total-score">${totalA}</span>
                            <div class="ht-scores ht-scores-left">
                                <span>${awayH1}</span>
                                <span>${awayH2}</span>
                            </div>
                        </div>
                        ${middleHTML}
                        <div class="team-container result-side">
                            <div class="ht-scores ht-scores-right">
                                <span>${homeH1}</span>
                                <span>${homeH2}</span>
                            </div>
                            <span class="total-score">${totalH}</span>
                            <span class="team-name result-name-right">${escapeHTML(homeData.name)}</span>
                            <div class="flag-box">${homeData.flag}</div>
                        </div>
                    `;
                    
                    setTimeout(() => rowEl.style.opacity = '1', 50);
                    
                    if(index === lastPlayableIndex) {
                        document.getElementById('predictBtn').disabled = false;
                    }
                }, 400 + (index * 200)); 
                
                activeTimeouts.push(tId);
            });
        }
    </script>
