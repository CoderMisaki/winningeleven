<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests" />
    <meta name="referrer" content="no-referrer" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <title>Retro Soccer Memory Backtest</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>
  <body>
    <main class="page-shell" aria-label="Retro Soccer Simulator">
      <section class="memory-panel" aria-label="Memory backtest">
        <span class="memory-label">P1</span>
        <select id="memorySelect" aria-label="Pilih memory"></select>
        <button class="btn btn-import" id="addMemoryBtn">+ Memory</button>
        <button class="btn btn-import" id="addGameBtn">+ Game</button>
        <div class="game-counter" id="gameCounter">Game 1</div>
        <button class="btn btn-predict" id="prevGameBtn">◀ Kiri</button>
        <button class="btn btn-predict" id="nextGameBtn">Kanan ▶</button>
        <button class="btn btn-import" id="saveMemoryBtn">Save</button>
      </section>

      <div class="controls-wrapper">
        <label for="rowCount">BARIS:</label>
        <input type="number" id="rowCount" value="7" min="1" max="100" inputmode="numeric" aria-describedby="inputHint" />
        <label for="importInput">KODE:</label>
        <input type="text" id="importInput" placeholder="Contoh: japvsjep, polvsned" autocomplete="off" autocapitalize="none" spellcheck="false" maxlength="240" aria-describedby="inputHint" />
        <div class="controls-actions">
          <button class="btn btn-import" id="importBtn">Import</button>
          <button class="btn btn-predict" id="predictBtn">Prediksi</button>
          <button class="btn btn-clear" id="clearBtn">Clear</button>
        </div>
        <div class="input-hint" id="inputHint">Manual editor di bawah mendukung smart search 3 huruf/singkatan negara. Simpan ke Memory 1, Memory 2, dst.</div>
      </div>

      <div class="game-screen">
        <div class="schedule-tab">SCHEDULE</div>
        <div class="main-board">
          <div class="cup-header"><span class="arrow" id="prevCupBtn">&#9664;</span><div class="cup-title"><h2 id="cupName">KONAMI CUP</h2><h3 id="roundName">ROUND 1</h3></div><span class="arrow" id="nextCupBtn">&#9654;</span></div>
          <div class="match-editor" id="matchEditor"></div>
          <div class="schedule-list" id="scheduleList" aria-live="polite"></div>
        </div>
        <section class="top-goals-panel" aria-labelledby="topGoalsTitle"><div class="top-goals-header"><h2 id="topGoalsTitle">TOP GOALS</h2><span class="manual-badge">BENDERA • PEMAIN • GOAL</span></div><div class="top-goals-list" id="topGoalsList"></div></section>
      </div>
    </main>
    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
