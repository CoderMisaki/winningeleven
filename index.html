<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; font-src 'self' https://fonts.gstatic.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; script-src 'self';">
    <title>WE10 Memory Research System </title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="src/css/styles.css" />

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
  <body>
    <main class="page-shell">
      <header class="we10-header">
        <h1>WE10 MEMORY SYSTEM </h1>
        <div class="system-sub">RESEARCH & DATASET ENGINE</div>
      </header>

      <section class="control-panel">
        <button class="btn" id="btnHomeView">MATCHING CENTER</button>
        <button class="btn" id="btnOpenDatabase">MEMORY DATABASE</button>
        <div id="activeViewIndicator" class="view-indicator">MODE: MATCHING CENTER</div>
      </section>

      <div class="game-screen">
        <div class="schedule-tab" id="panelTitle">MATCHING INTERFACE</div>
        
        <div class="main-board">
          <div class="editor-nav-bar hidden" id="editorNav">
            <button class="btn btn-nav" id="btnPrevGame">◀ PREV GAME</button>
            <div class="game-badge" id="currentGameLabel">
              GAME <input type="number" id="currentGameInput" value="1" min="1" style="width: 50px; text-align: center; font-family: var(--font-retro); font-size: 0.75rem; background: var(--bg-dark); color: var(--text-light); border: 1px solid var(--border-color);">
              <span id="totalGamesLabel">/ 1</span>
            </div>
            <button class="btn btn-nav" id="btnNextGame">NEXT GAME ▶</button>
            <button class="btn" id="btnAddGame">+ ADD GAME</button>
            <button class="btn" id="btnExitEditor" style="background-color: #550000; color: #ff5555; border-color: #ff0000;">EXIT EDITOR</button>
          </div>

          <div class="dataset-container">
            <div class="p1-row">
              <label for="p1Input">P1 METADATA (OPTIONAL):</label>
              <div class="team-input-wrap" style="flex-grow: 1;">
                <input type="text" id="p1Input" placeholder="Masukkan Negara P1 (e.g. Spain)" autocomplete="off" />
                <div class="suggestions-box hidden"></div>
              </div>
            </div>
            
            <div class="match-grid" id="matchGridForm">
              </div>
            <div class="section-title">TOP GOALS</div>
            <div class="top-goals-grid" id="topGoalsForm">
              </div>
          </div>

          <div class="action-footer" id="homeActions">
            <div class="filter-wrap" style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
              <label for="minSimilarity" style="font-size: 0.8rem;">Min Similarity (%):</label>
              <select id="minSimilarity" style="width: 70px; padding: 5px; font-family: 'Press Start 2P', monospace; font-size: 0.8rem; background: #000; color: #0f0; border: 1px solid #0f0;">
                <option value="0">0</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="75">75</option>
                <option value="90">90</option>
                <option value="95">95</option>
                <option value="100">100</option>
              </select>
            </div>
            <button class="btn btn-primary btn-large" id="btnRunMatch">CARI KECOCOKAN</button>
            <button class="btn" id="btnClearForm">RESET FORM</button>
          </div>
        </div>
      </div>

      <section class="results-panel hidden" id="resultsPanel">
        <div class="results-header">RESULT OUTPUT</div>
        <div class="results-body" id="resultsOutput"></div>
      </section>


      <section class="ai-qa-panel" id="aiQAPanel" style="margin-top: 20px; border: 1px solid var(--border-color); background: var(--bg-panel); display: flex; flex-direction: row; height: 600px;">
        <!-- SIDEBAR: CHAT SESSION MANAGER -->
        <div id="aiSidebar" style="width: 250px; border-right: 1px solid #555; display: flex; flex-direction: column; background: #0a0a0a;">
          <div style="padding: 10px; border-bottom: 1px solid #555;">
             <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <button class="btn btn-primary" id="btnNewChat" style="flex-grow: 1; margin-right: 5px;">+ New Chat</button>
                <button class="btn" id="btnCloseSidebar" style="display: none; padding: 5px 10px; background: #550000; color: #ff5555; border-color: #ff0000;">X</button>
             </div>
             <input type="text" id="chatSearchInput" placeholder="Search chats..." style="width: 100%; padding: 5px; font-family: var(--font-retro); font-size: 0.6rem; background: #222; color: #fff; border: 1px solid #555;">
             <div style="display: flex; gap: 5px; margin-top: 5px;">
               <button class="btn btn-menu" id="btnExportChats" style="flex-grow: 1; font-size: 0.5rem; padding: 4px;">Export</button>
               <button class="btn btn-menu" id="btnImportChats" style="flex-grow: 1; font-size: 0.5rem; padding: 4px;">Import</button>
               <button class="btn btn-menu" id="btnClearChats" style="flex-grow: 1; font-size: 0.5rem; padding: 4px; color: #f55;">Clear</button>
             </div>
          </div>
          <div id="chatSessionList" style="flex-grow: 1; overflow-y: auto; padding: 5px;">
             <!-- Sessions injected here -->
          </div>
        </div>

        <!-- MAIN CHAT AREA -->
        <div id="aiMainChat" style="flex-grow: 1; display: flex; flex-direction: column; position: relative;">
          <!-- Chat Header -->
          <div style="padding: 10px; border-bottom: 1px solid #555; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a;">
             <div style="display: flex; align-items: center; gap: 10px;">
                <button id="btnToggleSidebar">☰</button>
                <div id="currentChatTitle" style="font-family: var(--font-retro); font-size: 0.8rem; font-weight: bold; color: #fff;">New Chat</div>
                <div id="offlineIndicator" style="display: none; background: #f55; color: #fff; padding: 2px 5px; font-family: var(--font-retro); font-size: 0.5rem; border-radius: 3px; margin-left: 10px;">OFFLINE</div>
             </div>
             <div>
                <button class="btn btn-menu" id="btnViewBranches" style="font-size: 0.6rem; padding: 4px 8px; display: none;">View Branches</button>
             </div>
          </div>

          <!-- Messages Window -->
          <div id="aiChatWindow" style="flex-grow: 1; overflow-y: auto; padding: 15px; font-family: var(--font-mono); font-size: 0.85rem; display: flex; flex-direction: column; gap: 15px; background: var(--bg-dark);">
            <div style="color: #aaa; text-align: center; font-size: 0.7rem; margin-top: 20px;">[SYSTEM] AI Assistant Ready. ChatGPT Professional V4 Experience.</div>
          </div>

          <!-- Attachment Preview -->
          <div id="aiChatAttachmentPreview" style="display: none; background: #333; padding: 5px 10px; font-size: 0.7rem; color: #fff; border-top: 1px solid #555; align-items: center; justify-content: space-between;"></div>

          <!-- Input Area -->
          <div style="padding: 10px; background: #1a1a1a; border-top: 1px solid #555; display: flex; flex-direction: column; gap: 5px;">
            <div class="chat-input-wrapper">
              <select id="aiChatMode" class="chat-mode-select">
                <option value="normal">Normal</option>
                <option value="coding">Coding</option>
                <option value="bola">Bola</option>
              </select>
              <textarea id="aiChatInput" class="chat-textarea" placeholder="Message AI..." rows="1" autocomplete="off"></textarea>
              <div class="chat-action-buttons">
                <button class="btn" id="btnUploadAiChat" title="Attach File">📎</button>
                <button class="btn btn-primary" id="btnSendAiChat">SEND</button>
                <button class="btn" id="btnStopAiChat" style="display: none; background-color: #550000; color: #ff5555; border-color: #ff0000;">STOP</button>
              </div>

              <!-- Upload Menu -->
              <div id="aiChatUploadMenu" style="display: none; position: absolute; bottom: 100%; right: 75px; margin-bottom: 5px; background: #222; border: 1px solid #555; padding: 5px; flex-direction: column; gap: 5px; z-index: 100;">
                 <button class="btn btn-menu" data-type="image" style="font-size: 0.6rem; padding: 5px;">Image</button>
                 <button class="btn btn-menu" data-type="audio" style="font-size: 0.6rem; padding: 5px;">Audio</button>
                 <button class="btn btn-menu" data-type="video" style="font-size: 0.6rem; padding: 5px;">Video</button>
                 <button class="btn btn-menu" data-type="document" style="font-size: 0.6rem; padding: 5px;">Document</button>
              </div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 0 5px;">
              <div style="font-size: 0.55rem; color: #888; font-family: var(--font-retro);">
                Shift+Enter for newline.
              </div>
              <div id="contextBudgetIndicator" style="font-size: 0.55rem; color: #888; font-family: var(--font-mono);">
                Est. Context: 0 / 8192 tokens
              </div>
            </div>
          </div>
          <input type="file" id="aiChatFile" style="display: none;" />
          <input type="file" id="importChatsFile" class="hidden" accept=".json" />
        </div>
      </section>

    </main>

    <div class="modal-overlay hidden" id="databaseModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>MEMORY DATABASE</h2>
          <button class="close-modal" id="btnCloseModal">X</button>
        </div>
        <div class="modal-body" id="databaseModalList">
          </div>
      </div>
    </div>

    <input type="file" id="jsonImportField" class="hidden" accept=".json" />


    <div class="modal-overlay hidden" id="confirmModal">
      <div class="modal-content" style="max-width: 400px; text-align: center;">
        <div class="modal-header" style="justify-content: center; background-color: #550000;">
          <h2>KONFIRMASI</h2>
        </div>
        <div class="modal-body" style="padding: 20px;">
          <p id="confirmMessage" style="font-size: 0.9rem; margin-bottom: 20px;"></p>
          <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn btn-primary" id="btnConfirmYes" style="width: 100px;">Yes</button>
            <button class="btn" id="btnConfirmNo" style="width: 100px; background-color: #333; color: #fff; border-color: #555;">No</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
