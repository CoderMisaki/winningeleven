<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Soccer Simulator - Power Based Logic</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Retro Arcade Color Palette */
            --bg-dark: #111111;
            --bg-panel: #222222;
            --board-bg: #d6bc96;
            --row-light: #e0d0b8;
            --row-dark: #d4c2a5;
            --accent-primary: #ff4757; /* Action Red */
            --accent-secondary: #2ed573; /* Success Green */
            --accent-tertiary: #ffa502; /* Warning Orange */
            --border-color: #000000;
            --text-main: #333333;
            --text-light: #f1f2f6;
            --font-retro: 'Press Start 2P', monospace;
            --font-mono: 'Roboto Mono', monospace;

            /* Fluid Spacing & Sizes */
            --spacing-xs: clamp(0.25rem, 1vw, 0.5rem);
            --spacing-sm: clamp(0.5rem, 1.5vw, 1rem);
            --spacing-md: clamp(1rem, 2vw, 1.5rem);
            --spacing-lg: clamp(1.5rem, 3vw, 2rem);

            --font-xs: clamp(0.6rem, 1.2vw, 0.75rem);
            --font-sm: clamp(0.75rem, 1.5vw, 0.875rem);
            --font-md: clamp(0.875rem, 2vw, 1rem);
            --font-lg: clamp(1rem, 2.5vw, 1.25rem);
            --font-xl: clamp(1.25rem, 3vw, 1.5rem);
        }

        body {
            margin: 0;
            padding: var(--spacing-sm);
            background-color: var(--bg-dark);
            font-family: var(--font-mono);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Container for controls */
        .controls-wrapper {
            width: 100%;
            max-width: clamp(300px, 95%, 900px);
            background: var(--bg-panel);
            border: 4px solid var(--border-color);
            border-radius: 8px;
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            box-shadow: 4px 4px 0px rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-sm);
            align-items: center;
            box-sizing: border-box;
        }

        @media (min-width: 600px) {
            .controls-wrapper {
                grid-template-columns: auto auto 1fr;
                grid-template-rows: auto auto;
            }
            .controls-actions {
                grid-column: 1 / -1;
                display: flex;
                gap: var(--spacing-sm);
                justify-content: flex-end;
            }
        }
        @media (min-width: 900px) {
            .controls-wrapper {
                grid-template-columns: auto auto 1fr auto auto auto;
                grid-template-rows: auto;
            }
            .controls-actions {
                grid-column: auto;
                display: contents; /* Inherit grid */
            }
        }

        .controls-wrapper label {
            font-weight: bold;
            font-size: var(--font-sm);
            font-family: var(--font-retro);
            text-shadow: 1px 1px 0 #000;
        }

        .controls-wrapper input[type="number"],
        .controls-wrapper input[type="text"] {
            padding: var(--spacing-sm);
            font-size: var(--font-md);
            font-family: var(--font-mono);
            border: 2px inset var(--bg-dark);
            background: #dddddd;
            color: #111;
            border-radius: 4px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        .controls-wrapper input[type="text"] {
            text-transform: lowercase;
        }

        .controls-wrapper input:focus {
            background: #ffffff;
            border-color: var(--accent-tertiary);
        }

        .btn {
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: var(--font-sm);
            font-family: var(--font-retro);
            font-weight: bold;
            border: 4px solid var(--border-color);
            cursor: pointer;
            border-radius: 0;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.8);
            transition: all 0.1s ease;
            width: 100%;
            box-sizing: border-box;
        }

        @media (min-width: 600px) {
            .btn {
                width: auto;
            }
        }

        .btn-import { background: var(--accent-secondary); color: var(--text-main); }
        .btn-predict { background: var(--accent-tertiary); color: var(--text-main); }
        .btn-clear { background: var(--accent-primary); color: var(--text-light); }
        
        .btn:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px rgba(0,0,0,0.8);
            filter: brightness(1.1);
        }
        .btn:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.8);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #777;
            color: #aaa;
            box-shadow: none;
            transform: translate(4px, 4px);
        }

        /* Game Screen */
        .game-screen {
            width: 100%;
            max-width: clamp(300px, 95%, 900px);
            background-color: var(--board-bg);
            background-image: 
                linear-gradient(rgba(255,255,255,0.4) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255,255,255,0.4) 2px, transparent 2px);
            background-size: 30px 30px;
            padding: var(--spacing-md);
            box-sizing: border-box;
            border: 6px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.8);
            position: relative;
        }

        .schedule-tab {
            background-color: var(--bg-panel);
            color: var(--text-light);
            display: inline-block;
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: var(--font-md);
            font-family: var(--font-retro);
            border: 4px solid var(--border-color);
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            margin-bottom: -4px;
            position: relative;
            z-index: 2;
            text-shadow: 2px 2px 0 #000;
        }

        .main-board {
            background-color: rgba(255, 255, 255, 0.7);
            border: 4px solid var(--border-color);
            position: relative;
            z-index: 1;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            border-radius: 0 12px 12px 12px;
            overflow: hidden;
        }

        .cup-header {
            background-color: #2d2d2d;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-sm) var(--spacing-md);
            border-bottom: 4px solid var(--border-color);
        }

        .arrow { color: var(--accent-tertiary); font-size: var(--font-xl); cursor: pointer; transition: transform 0.2s; user-select: none; }
        .arrow:hover { transform: scale(1.2); }
        .cup-title { text-align: center; }
        .cup-title h2 { margin: 0; font-size: var(--font-md); font-family: var(--font-retro); letter-spacing: 1px; text-shadow: 2px 2px 0px #000; color: var(--accent-tertiary); }
        .cup-title h3 { margin: var(--spacing-xs) 0 0 0; font-size: var(--font-xs); font-family: var(--font-retro); color: #ccc; }

        .schedule-list {
            display: flex;
            flex-direction: column;
        }
        
        .match-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: var(--spacing-sm);
            border-bottom: 2px solid #555;
            min-height: clamp(50px, 8vh, 70px);
            background-color: var(--row-dark);
            color: var(--text-main);
            transition: background-color 0.2s ease;
        }

        .match-row:nth-child(even) { background-color: var(--row-light); }
        .match-row:hover { background-color: #ffffff; }

        .team-container {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }
        .left-team { justify-content: flex-end; }
        .right-team { justify-content: flex-start; flex-direction: row-reverse; }

        .team-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            flex-direction: inherit; /* inherit from .left-team or .right-team */
        }

        .team-name {
            font-size: var(--font-sm);
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: clamp(60px, 15vw, 150px);
            text-transform: uppercase;
        }
        .empty-name { color: #888; font-weight: normal; font-style: italic; }

        .flag-box {
            width: clamp(24px, 4vw, 36px);
            height: clamp(16px, 2.7vw, 24px);
            border: 2px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            font-size: clamp(16px, 3vw, 24px);
            overflow: hidden;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            flex-shrink: 0;
            user-select: none;
        }
        .empty-flag { background: #bbb; box-shadow: none; }

        .center-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: clamp(60px, 12vw, 120px);
            margin: 0 var(--spacing-xs);
        }

        .score-box {
            width: 100%;
            height: clamp(24px, 4vw, 36px);
            background-color: var(--bg-panel);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: var(--font-md);
            font-family: var(--font-retro);
            border: 2px solid var(--border-color);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8);
            border-radius: 4px;
        }

        /* Result Styles */
        .score-details {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            font-family: var(--font-mono);
            font-weight: bold;
        }

        .ht-scores-col {
            display: flex;
            flex-direction: column;
            font-size: var(--font-xs);
            color: #555;
            text-align: center;
            line-height: 1;
        }

        .total-score {
            font-size: var(--font-lg);
            font-family: var(--font-retro);
            color: var(--text-main);
            text-shadow: 1px 1px 0px #fff;
        }

        .dash {
            font-size: var(--font-md);
            font-weight: bold;
            color: #444;
            padding: 0 var(--spacing-xs);
        }

        .ext-pk-box {
            font-size: var(--font-xs);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2px;
            color: var(--accent-primary);
            font-weight: bold;
            font-family: var(--font-retro);
            line-height: 1.2;
            text-align: center;
            margin-top: 4px;
        }

        /* Loading Skeleton Animation */
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .loading .score-box {
            background-color: #555;
            color: transparent;
            animation: pulse 1s infinite;
            border-color: #777;
        }

        .loading .team-name {
            color: #777;
        }
    </style>
</head>

            },
            currentMatches: [],
            activeTimeouts: [],

            init: function() {
                // Menghitung Base Power sesuai data atribut
                for (let key in this.teamsDB) {
                    let t = this.teamsDB[key];
                    t.power = Math.round(t.offense * 0.22 + t.defense * 0.22 + t.speed * 0.18 + t.technique * 0.18 + t.teamwork * 0.20);
                }
            },

            clearTimeouts: function() {
                this.activeTimeouts.forEach(clearTimeout);
                this.activeTimeouts = [];
            },

            addTimeout: function(tId) {
                this.activeTimeouts.push(tId);
            }
        };

        // --- 2. SIMULATION ENGINE ---
        const SimulationEngine = {
            calculateScore: function(home, away) {
                let powerDiff = home.power - away.power;
                let absDiff = Math.abs(powerDiff);

                let hGoals = 0;
                let aGoals = 0;

                // KONSEP DETERMINISTIK MUTLAK
                if (absDiff === 0) {
                    // ATURAN 1: POWER SAMA = WAJIB DRAW (Skor random 0-0 sampai 2-2)
                    let drawGoals = Math.floor(Math.random() * 3);
                    hGoals = drawGoals;
                    aGoals = drawGoals;
                } else {
                    // ATURAN 2: POWER LEBIH BESAR WAJIB MENANG & SELISIH POWER = SELISIH GOL
                    let goalMargin = 1;

                    if (absDiff === 1) {
                        goalMargin = 1; // 1-0, 2-1
                    } else if (absDiff === 2) {
                        goalMargin = Math.random() < 0.5 ? 1 : 2; // 2-0, 2-1
                    } else if (absDiff === 3) {
                        goalMargin = 2; // 2-0, 3-1
                    } else if (absDiff === 4) {
                        goalMargin = Math.random() < 0.5 ? 2 : 3; // 3-1, 3-0
                    } else if (absDiff === 5) {
                        goalMargin = 3; // 3-0, 4-1
                    } else if (absDiff >= 6) {
                        // Skor bantai mirroring selisih power (misal beda 8 power -> beda 4/5 gol)
                        goalMargin = Math.floor(absDiff / 1.6) + (Math.random() > 0.5 ? 1 : 0);
                    }

                    // Capping margin agar skor maksimal tidak tembus belasan
                    if (goalMargin > 8) goalMargin = 8;
                    if (goalMargin < 1) goalMargin = 1;

                    // Menentukan gol hiburan untuk tim yang kalah
                    let losingGoals = 0;
                    let r = Math.random();
                    if (absDiff < 4) {
                        // Match ketat, tim kalah masih mungkin cetak gol
                        losingGoals = r < 0.5 ? 0 : (r < 0.85 ? 1 : 2);
                    } else {
                        // Match bantai, tim kalah sangat jarang cetak gol
                        losingGoals = r < 0.75 ? 0 : 1;
                    }

                    if (powerDiff > 0) {
                        // Tim Home Menang
                        aGoals = losingGoals;
                        hGoals = aGoals + goalMargin;
                    } else {
                        // Tim Away Menang
                        hGoals = losingGoals;
                        aGoals = hGoals + goalMargin;
                    }
                }

                let wentToExtraTime = false;
                let wentToPenalties = false;
                let exH = 0, exA = 0;
                let pkH = 0, pkA = 0;

                // Logika Turnamen Gugur Konami Cup (Khusus jika skor waktu normal Draw)
                if (hGoals === aGoals) {
                    wentToExtraTime = true;
                    let exChance = Math.random();
                    if (exChance < 0.5) {
                        if (Math.random() < 0.5) exH = 1; else exA = 1;
                    } else {
                        if (Math.random() < 0.4) { exH = 1; exA = 1; }
                    }

                    if ((hGoals + exH) === (aGoals + exA)) {
                        wentToPenalties = true;
                        pkH = Math.floor(Math.random() * 3) + 3;
                        pkA = Math.floor(Math.random() * 3) + 3;
                        if (pkH === pkA) {
                            if (Math.random() < 0.5) pkH++; else pkA++;
                        }
                    }
                }

                return {
                    h: hGoals, a: aGoals,
                    wentToExtraTime, wentToPenalties,
                    exH, exA, pkH, pkA
                };
            }
        };

        // --- 3. UI/RENDER ENGINE ---
        const UIEngine = {
            escapeHTML: function(str) {
                const div = document.createElement('div');
                div.appendChild(document.createTextNode(str));
                return div.innerHTML;
            },

            clearAll: function() {
                State.clearTimeouts();
                document.getElementById('predictBtn').disabled = false;
                document.getElementById('importInput').value = "";

                let rowCount = parseInt(document.getElementById('rowCount').value);
                if(isNaN(rowCount)) rowCount = 7;
                rowCount = Math.min(16, Math.max(1, rowCount));
                document.getElementById('rowCount').value = rowCount;

                State.currentMatches = Array(rowCount).fill().map(() => ({ home: null, away: null, played: false }));
                this.renderSchedule();
            },

            importTeams: function() {
                State.clearTimeouts();
                document.getElementById('predictBtn').disabled = false;

                const inputVal = document.getElementById('importInput').value.toLowerCase();
                let rowCount = parseInt(document.getElementById('rowCount').value);

                if(isNaN(rowCount)) rowCount = 7;
                rowCount = Math.min(16, Math.max(1, rowCount));
                document.getElementById('rowCount').value = rowCount;

                if(inputVal.trim() === "") {
                    alert("Format kode kosong!");
                    return;
                }

                // Strict Regex Parsing untuk menangani spasi tambahan
                // Format yang diharapkan: "team1vs team2 , team3 vsteam4"
                let rawMatchups = inputVal.split(',').map(m => m.trim()).filter(m => m !== '');
                let parsedMatches = [];
                let invalidInputs = [];

                const regex = /^\s*([a-z]+)\s*vs\s*([a-z]+)\s*$/;

                rawMatchups.forEach(matchup => {
                    const match = matchup.match(regex);
                    if(match) {
                        let homeCode = match[1].toUpperCase();
                        let awayCode = match[2].toUpperCase();
                        if(State.teamsDB[homeCode] && State.teamsDB[awayCode]) {
                            parsedMatches.push({ home: homeCode, away: awayCode, played: false });
                        } else {
                            invalidInputs.push(matchup);
                        }
                    } else {
                        invalidInputs.push(matchup);
                    }
                });

                if (invalidInputs.length > 0) {
                    alert("Format atau kode negara tidak valid (diabaikan):\n\n" + invalidInputs.join("\n"));
                }

                State.currentMatches = [];
                for(let i = 0; i < rowCount; i++) {
                    if(parsedMatches[i]) State.currentMatches.push(parsedMatches[i]);
                    else State.currentMatches.push({ home: null, away: null, played: false });
                }
                this.renderSchedule();
            },

            renderSchedule: function() {
                const listEl = document.getElementById('scheduleList');
                listEl.innerHTML = ''; // Start fresh

                State.currentMatches.forEach((match, index) => {
                    const row = document.createElement('div');
                    row.className = 'match-row';
                    row.id = `row-${index}`;

                    // Create Left Team Container
                    const leftTeamDiv = document.createElement('div');
                    leftTeamDiv.className = 'team-container left-team';
                    leftTeamDiv.id = `team-left-${index}`;

                    const leftTeamInfo = document.createElement('div');
                    leftTeamInfo.className = 'team-info';

                    const leftTeamName = document.createElement('span');
                    leftTeamName.className = 'team-name';
                    const leftFlagBox = document.createElement('div');
                    leftFlagBox.className = 'flag-box';

                    if(match.home && match.away) {
                        const homeData = State.teamsDB[match.home];
                        leftTeamName.textContent = homeData.name;
                        leftFlagBox.textContent = homeData.flag;
                    } else {
                        leftTeamName.className = 'team-name empty-name';
                        leftTeamName.textContent = '---';
                        leftFlagBox.className = 'flag-box empty-flag';
                    }
                    leftTeamInfo.appendChild(leftTeamName);
                    leftTeamInfo.appendChild(leftFlagBox);
                    leftTeamDiv.appendChild(leftTeamInfo);


                    // Create Center Score Display
                    const centerDisplay = document.createElement('div');
                    centerDisplay.className = 'center-display';
                    centerDisplay.id = `score-center-${index}`;

                    const scoreBox = document.createElement('div');
                    scoreBox.className = 'score-box';

                    const scoreText = document.createElement('span');
                    scoreText.className = 'score-text';
                    scoreText.textContent = '-';
                    scoreBox.appendChild(scoreText);
                    centerDisplay.appendChild(scoreBox);


                    // Create Right Team Container
                    const rightTeamDiv = document.createElement('div');
                    rightTeamDiv.className = 'team-container right-team';
                    rightTeamDiv.id = `team-right-${index}`;

                    const rightTeamInfo = document.createElement('div');
                    rightTeamInfo.className = 'team-info';

                    const rightTeamName = document.createElement('span');
                    rightTeamName.className = 'team-name';
                    const rightFlagBox = document.createElement('div');
                    rightFlagBox.className = 'flag-box';

                    if(match.home && match.away) {
                        const awayData = State.teamsDB[match.away];
                        rightTeamName.textContent = awayData.name;
                        rightFlagBox.textContent = awayData.flag;
                    } else {
                        rightTeamName.className = 'team-name empty-name';
                        rightTeamName.textContent = '---';
                        rightFlagBox.className = 'flag-box empty-flag';
                    }
                    rightTeamInfo.appendChild(rightTeamName);
                    rightTeamInfo.appendChild(rightFlagBox);
                    rightTeamDiv.appendChild(rightTeamInfo);


                    // Append everything to row
                    row.appendChild(leftTeamDiv);
                    row.appendChild(centerDisplay);
                    row.appendChild(rightTeamDiv);
                    
                    listEl.appendChild(row);
                });
            },

            predictAll: function() {
                let hasValidMatch = State.currentMatches.some(m => m.home && m.away && !m.played);
                if(!hasValidMatch) return alert("Tidak ada pertandingan baru yang bisa diprediksi!");

                document.getElementById('predictBtn').disabled = true;

                let lastPlayableIndex = -1;
                for (let i = State.currentMatches.length - 1; i >= 0; i--) {
                    if (State.currentMatches[i].home && !State.currentMatches[i].played) {
                        lastPlayableIndex = i;
                        break;
                    }
                }

                State.currentMatches.forEach((match, index) => {
                    if(!match.home || !match.away || match.played) return;

                    const rowEl = document.getElementById(`row-${index}`);
                    const homeData = State.teamsDB[match.home];
                    const awayData = State.teamsDB[match.away];

                    match.played = true;
                    rowEl.classList.add('loading'); // Add skeleton loading class
                    
                    let tId = setTimeout(() => {
                        const result = SimulationEngine.calculateScore(homeData, awayData);

                        const homeH1 = result.h === 0 ? 0 : Math.floor(Math.random() * (result.h + 1));
                        const homeH2 = result.h - homeH1;
                        const awayH1 = result.a === 0 ? 0 : Math.floor(Math.random() * (result.a + 1));
                        const awayH2 = result.a - awayH1;

                        let totalH = result.h + result.exH;
                        let totalA = result.a + result.exA;

                        // Target the existing score box
                        const centerDisplay = document.getElementById(`score-center-${index}`);
                        centerDisplay.innerHTML = ''; // Clear the '-' text

                        const scoreBox = document.createElement('div');
                        scoreBox.className = 'score-box';

                        const scoreDetails = document.createElement('div');
                        scoreDetails.className = 'score-details';

                        // Left side of score (Home Team Goals - structurally stays on left)
                        const totalHText = document.createElement('span');
                        totalHText.className = 'total-score';
                        totalHText.textContent = totalH;

                        const leftHTCol = document.createElement('div');
                        leftHTCol.className = 'ht-scores-col';
                        const h1Span = document.createElement('span');
                        h1Span.textContent = homeH1;
                        const h2Span = document.createElement('span');
                        h2Span.textContent = homeH2;
                        leftHTCol.appendChild(h1Span);
                        leftHTCol.appendChild(h2Span);

                        scoreDetails.appendChild(totalHText);
                        scoreDetails.appendChild(leftHTCol);

                        // Middle Dash / PK info
                        if (result.wentToPenalties) {
                            const pkBox = document.createElement('div');
                            pkBox.className = 'ext-pk-box';

                            const exText = document.createElement('span');
                            exText.textContent = `${result.exH} EX. ${result.exA}`; // Order: Left (Home) - Right (Away)

                            const pkText = document.createElement('span');
                            pkText.textContent = `${result.pkH} P.K. ${result.pkA}`;

                            pkBox.appendChild(exText);
                            pkBox.appendChild(pkText);
                            scoreDetails.appendChild(pkBox);
                        } else if (result.wentToExtraTime) {
                            const extBox = document.createElement('div');
                            extBox.className = 'ext-pk-box';

                            const exText = document.createElement('span');
                            exText.textContent = `${result.exH} EX. ${result.exA}`;

                            extBox.appendChild(exText);
                            scoreDetails.appendChild(extBox);
                        } else {
                            const dash = document.createElement('div');
                            dash.className = 'dash';
                            dash.textContent = '-';
                            scoreDetails.appendChild(dash);
                        }

                        // Right side of score (Away Team Goals)
                        const rightHTCol = document.createElement('div');
                        rightHTCol.className = 'ht-scores-col';
                        const a1Span = document.createElement('span');
                        a1Span.textContent = awayH1;
                        const a2Span = document.createElement('span');
                        a2Span.textContent = awayH2;
                        rightHTCol.appendChild(a1Span);
                        rightHTCol.appendChild(a2Span);

                        const totalAText = document.createElement('span');
                        totalAText.className = 'total-score';
                        totalAText.textContent = totalA;

                        scoreDetails.appendChild(rightHTCol);
                        scoreDetails.appendChild(totalAText);

                        scoreBox.appendChild(scoreDetails);
                        centerDisplay.appendChild(scoreBox);

                        rowEl.classList.remove('loading');

                        if(index === lastPlayableIndex) {
                            document.getElementById('predictBtn').disabled = false;
                        }
                    }, 800 + (index * 400)); // slightly longer for retro loading feel
                    
                    State.addTimeout(tId);
                });
            }
        };

        // --- 4. INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            State.init();
            UIEngine.clearAll();

            // Event Listeners
            document.getElementById('importBtn').addEventListener('click', () => UIEngine.importTeams());
            document.getElementById('predictBtn').addEventListener('click', () => UIEngine.predictAll());
            document.getElementById('clearBtn').addEventListener('click', () => UIEngine.clearAll());
        });
    </script>
</body>
</html>
